<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
</head>
<body>

<h1>Contact Me</h1>

<form>
    <label>Name:</label>
    <input type="text" required><br><br>

    <label>Email:</label>
    <input type="email" required><br><br>

    <label>Phone:</label>
    <input type="tel"><br><br>

    <label>Message:</label><br>
    <textarea required></textarea><br><br>

    <button type="submit">Send</button>
</form>

</body>
</html>
